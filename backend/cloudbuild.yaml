# Google Cloud Build → Cloud Run (adjust project_id, region, service name)
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "gcr.io/$PROJECT_ID/swerte3-api:$COMMIT_SHA", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "gcr.io/$PROJECT_ID/swerte3-api:$COMMIT_SHA"]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - swerte3-api
      - --image=gcr.io/$PROJECT_ID/swerte3-api:$COMMIT_SHA
      - --region=asia-southeast1
      - --platform=managed
      - --allow-unauthenticated
